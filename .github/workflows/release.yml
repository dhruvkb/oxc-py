name: release

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.detect.outputs.tools }}
      versions: ${{ steps.detect.outputs.versions }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - id: detect
        run: python scripts/check_versions.py

  build:
    needs: check
    if: needs.check.outputs.tools != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.check.outputs.tools) }}
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Build wheel
        run: |
          python scripts/build_wheel.py \
            --tool "${{ matrix.tool }}" \
            --version "${{ fromJson(needs.check.outputs.versions)[matrix.tool] }}" \
            --target "${{ matrix.target }}" \
            --release-tag "${{ needs.check.outputs.release_tag }}" \
            --outdir build
      - name: Check wheel metadata
        run: twine check build/dist/*.whl
      - name: Smoke-test native wheel
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install build/dist/*.whl
          got="$(/tmp/smoke/bin/${{ matrix.tool }} --version)"
          echo "$got"
          echo "$got" | grep -qF "${{ fromJson(needs.check.outputs.versions)[matrix.tool] }}"
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.tool }}-${{ matrix.target }}
          path: build/dist/*.whl

  publish-oxlint:
    needs: [check, build]
    if: contains(fromJson(needs.check.outputs.tools), 'oxlint')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-oxlint-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-oxfmt:
    needs: [check, build]
    if: contains(fromJson(needs.check.outputs.tools), 'oxfmt')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-oxfmt-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
